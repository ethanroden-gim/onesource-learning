<!doctype html>
<html lang="en">
  <head>

    <style>
      :root {
        color-scheme: light;
        font-family: Arial, Helvetica, sans-serif;

      body {
        margin: 0;
        min-height: 100vh;
      }

      main {
        width: min(920px, calc(100% - 32px));

        margin: 0 0 28px;

      }

      ol {
        display: grid;
        gap: 12px;
        padding: 0;
        margin: 0;
        list-style: none;
      }

      a {
        display: block;
        padding: 18px 20px;
        border: 1px solid #d8deea;
