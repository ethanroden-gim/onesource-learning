<script>
const moduleData={module:3,storage:"buzzkill-dm-module-03",title:"The Pest Control Customer Journey",next:"Next, you will learn how local visibility, Google Business Profile, SEO, and reviews help pest control customers find and trust BuzzKill.",steps:["Start","Objective","Journey","Audience","Intent","Friction","Handoff","Map","Channels","Scenario","Check","Wrap-Up"],slides:[
{type:"hero",dark:true,kicker:"Module 3",title:"The pest control customer journey <em>from concern to trust</em>",lede:"Customers usually decide whether to contact BuzzKill before they ever speak to the team. Marketing shapes what they see, what they trust, and whether they take the next step.",cards:[["10-12 minutes","This module follows the path from pest concern to search, evaluation, contact, booking, service, reviews, referrals, and recurring revenue."],["Core idea","Good marketing does not end at the click. It helps move the right customer from concern to contact, from contact to booked service, and from service to long-term trust."]]},
{type:"cards",kicker:"Learning objective",title:"Support the full journey, not just <em>traffic</em>",lede:"By the end of this module, you will be able to describe the pest control customer journey and identify where digital marketing can improve visibility, trust, lead quality, conversion, booking, reviews, and retention.",cards:[["Journey stages",["Problem awareness","Search","Evaluation","Contact","Qualification and handoff","Booking","Service experience","Follow-up, reviews, and retention"]],["Audience differences",["Residential customers often move quickly on mobile.","Property managers look for vendor confidence and documentation.","Commercial customers need professionalism, prevention, and minimal disruption."]]]},
{type:"accordion",kicker:"Journey overview",title:"From pest concern to <em>long-term customer</em>",lede:"Most pest control customers follow this journey, though the pace and decision process changes by customer type.",items:[
["Problem Awareness","The customer notices a pest concern or receives a report from someone else.","Examples: ants in the kitchen, mice reported by residents, roaches near a business storage area, board complaints, or prevention needs. Marketing can help through seasonal reminders, education, email, and awareness campaigns. Key question: what issue is the customer experiencing, and how urgent does it feel?"],
["Search","The customer looks for a provider through Google, Maps, reviews, referrals, or a vendor list.","Examples include pest control near me, mouse exterminator near me, condo pest control company, commercial pest control service, mosquito treatment for yard, termite inspection, and roach control for apartments. Marketing must improve local SEO, GBP, paid search, service pages, and review presence."],
["Evaluation","The customer compares providers and decides whether BuzzKill seems credible, relevant, and easy to contact.","They may check reviews, website clarity, service area, pest-specific pages, HOA or commercial pages, photos, professionalism, response expectations, and contact options. Marketing builds trust with relevant pages, FAQs, reviews, proof points, and clean conversion paths."],
["Contact","The customer calls, submits a form, emails, messages, or requests a quote.","Marketing affects whether contact is easy, mobile-friendly, trackable, and routed correctly. Key question: is it obvious what the customer should do next, and can BuzzKill track where the lead came from?"],
["Qualification and Handoff","BuzzKill determines whether the lead is a good fit and what should happen next.","Qualification may include service area, customer type, pest concern, urgency, property type, one-time versus recurring opportunity, access, authorization, pricing, inspection, or manager review. Marketing helps by generating better-fit leads and capturing useful fields."],
["Booking","The lead becomes an appointment, estimate, inspection, consultation, or proposal opportunity.","Booking may involve residential service, inspection, estimate, commercial consultation, association approval, managed-property access, or service windows. Marketing should watch whether leads become booked work or drop off after contact."],
["Service Experience","The technician or team provides service, inspection, treatment, follow-up, or account support.","Residential customers need reassurance and prep clarity. Property managers need documentation and resident-sensitive coordination. Commercial customers need professionalism and minimal disruption. Marketing should learn from questions and objections."],
["Follow-Up, Reviews, and Retention","The customer may review, book follow-up, start recurring service, refer BuzzKill, or return later.","Opportunities include review requests, seasonal reminders, recurring plan education, commercial retention, association renewal, email follow-up, referrals, and prevention content. Marketing turns completed service into long-term trust."]]},
{type:"tabs",kicker:"Audience-specific paths",title:"Different customers take different <em>journeys</em>",tabs:[
["Association / Property","Typical trigger: resident complaints, recurring pest issue, vendor search, board concern, or a need for a more reliable service partner. Search behavior includes HOA pest control company, condo pest control service, property management pest control, rodent control for condo building, and pest control vendor for associations. Evaluation priorities are reliability, responsiveness, documentation, multi-unit coordination, resident sensitivity, recurring service, and vendor professionalism. Likely path: search or referral, website and proof review, reviews and service area, call/email/proposal request, qualification, then estimate, service agreement, or recurring opportunity. Watch-out: do not make this sound like a homeowner emergency page."],
["Residential","Typical trigger: visible pest activity, noises, bites, damage, or seasonal prevention interest. Searches include pest control near me, ant control near me, mouse exterminator, mosquito treatment for yard, termite inspection, and bed bug treatment near me. Priorities are speed, local trust, reviews, clear service descriptions, easy scheduling, safety-conscious communication, pricing or estimate path, and what to expect. Watch-out: unclear mobile CTAs or long forms can lose these leads quickly."],
["Commercial","Typical trigger: pest activity, employee/customer complaint, prevention need, or vendor search before problems escalate. Searches include commercial pest control near me, pest control for businesses, office pest control, recurring commercial pest control, and pest prevention for commercial property. Priorities are professionalism, consistency, discretion, minimal disruption, documentation, vendor responsiveness, and business-appropriate scheduling. Watch-out: avoid specialized commercial claims unless confirmed."]]},
{type:"cards",kicker:"Search intent",title:"Search intent tells you what the customer <em>needs next</em>",lede:"A query or customer message gives clues about urgency, audience type, and the next best page, ad, form, CTA, or follow-up.",cards:[
["Urgent residential search",["Examples: mouse exterminator near me, ants in kitchen pest control, bed bug help near me.","Likely need: fast reassurance and a clear path to service.","Assets: pest-specific page, GBP, paid search ad, mobile click-to-call, simple form, reviews.","CTA: Schedule service."]],
["Seasonal residential search",["Examples: mosquito treatment for yard, tick control near me, summer pest control.","Likely need: seasonal prevention or outdoor comfort.","Assets: seasonal campaign page, Google Ads, local SEO page, email reminder, review-supported landing page.","CTA: Request seasonal pest service."]],
["Association vendor search",["Examples: HOA pest control company, condo pest control service, property management pest control vendor.","Likely need: reliable vendor, recurring service, documentation, proposal, or consultation.","Assets: HOA/condo page, property management landing page, proposal form, proof points, reviews.","CTA: Request association pest control support."]],
["Commercial search",["Examples: commercial pest control near me, pest control for business, recurring commercial pest control.","Likely need: professional prevention, recurring service, or discreet issue resolution.","Assets: commercial page, paid search campaign, quote form, local SEO, business-focused landing page.","CTA: Request commercial pest control support."]],
["Inspection or research search",["Examples: Are these termites?, signs of termite damage, what do bed bugs look like?, why do ants keep coming back?","Likely need: education, reassurance, and a safe next step.","Assets: FAQ, educational blog, inspection-focused service page, careful language that does not diagnose.","CTA: Schedule an inspection or request help identifying the next step."]]]},
{type:"compare",kicker:"Friction points",title:"Where leads are <em>won or lost</em>",leftTitle:"Conversion boosters",left:["Clear service pages by pest type and audience","Strong local visibility and accurate GBP information","Visible phone number and click-to-call","Simple form with relevant fields","Clear service area information","Reviews and trust signals","Fast mobile-friendly pages","Audience-specific landing pages","Call, form, and campaign tracking","Marketing aligned with scheduling capacity"],rightTitle:"Lead leaks",right:["Generic content that does not match the need","Hard-to-find phone number","Too many fields for urgent residential leads","No commercial or HOA-specific page","Weak or outdated reviews","No clear service area information","Ads sending all traffic to the homepage","No tracking for calls or forms","Poor handoff from marketing to scheduling","Claims that overpromise or create operational issues"]},
{type:"flow",kicker:"Marketing and operations",title:"The click is not the <em>finish line</em>",steps:["Marketing creates visibility through search, ads, reviews, email, referral, or website content.","Customer takes action by calling, submitting a form, emailing, or requesting a quote.","Admin qualifies customer type, service area, pest concern, urgency, property details, and next step.","Operations schedules or routes the lead into service, inspection, estimate, proposal, or manager review.","Service experience creates feedback through questions, complaints, reviews, and repeat issues.","Marketing improves pages, ads, forms, follow-up, and lead quality using real outcomes."],callout:"Marketer mindset: do not only ask how many leads did we get. Ask whether they were the right leads, whether they booked, and what can improve in the journey."},
{type:"sequence",kicker:"Activity",title:"Build the customer <em>journey</em>",instructions:"Select the correct stage number for each event.",items:[["A","Customer notices pest activity or receives a pest complaint",1],["B","Customer searches online or asks for a referral",2],["C","Customer compares BuzzKill reviews, website, and service information",3],["D","Customer calls, emails, or submits a form",4],["E","BuzzKill qualifies the lead and confirms the next step",5],["F","Service, inspection, estimate, or proposal is scheduled",6],["G","Service experience occurs and customer expectations are managed",7],["H","Customer leaves a review, books follow-up, starts recurring service, or refers BuzzKill",8]],success:"Correct. This is the basic journey from problem awareness to long-term customer value. Marketing influences every stage, not just the first click.",partial:"You have some stages right. Think: concern, search, evaluation, contact, qualification, booking, service, retention."},
{type:"match",kicker:"Activity",title:"Match the channel to the journey <em>stage</em>",instructions:"Choose the journey stage where each marketing asset is most useful.",options:[["A","Search / Evaluation"],["B","Contact"],["C","Contact / Qualification"],["D","Follow-Up / Reviews / Retention"],["E","Problem Awareness / Retention"],["F","Qualification / Measurement"]],items:[["Google Business Profile","A"],["Pest-specific service page","A"],["Click-to-call button","B"],["Lead form asking customer type, service area, and pest concern","C"],["Review request email after service","D"],["Commercial pest control landing page","A"],["Seasonal mosquito email reminder","E"],["Call tracking by campaign source","F"]],success:"Good work. Channels and assets should be designed around where the customer is in the decision process."},
{type:"scenario",kicker:"Scenario practice",title:"Where is the customer in the <em>journey?</em>",scenarios:[
["A homeowner searches ant control near me on their phone after seeing ants in the kitchen.",["Follow-up and retention","Search / urgent residential intent","Commercial recurring service","Association proposal review"],1,"This is an urgent residential search. The experience should make it easy to find BuzzKill, trust reviews, confirm service area, and call or request service quickly."],
["A property manager visits the website after complaints about mice in multiple condo units and wants signs BuzzKill understands managed communities.",["Evaluation stage for association/property management customer","Post-service review stage","Seasonal residential awareness","Technician-only workflow"],0,"The property manager is evaluating whether BuzzKill is a credible vendor for a managed property."],
["A local business submits a form asking about recurring pest prevention for their office.",["Residential seasonal campaign","Commercial contact and qualification stage","Review generation stage only","Blog research stage only"],1,"This is a commercial lead entering contact and qualification. The form should capture business type, location, pest concern, urgency, and recurring service interest."],
["A residential customer completes service and praises the technician's professionalism.",["Search stage","Evaluation stage","Follow-up, review, and retention opportunity","Initial problem awareness only"],2,"A satisfied customer creates an opportunity for a review request, retention messaging, seasonal reminder, or recurring service education."],
["BuzzKill runs commercial pest control ads but sends every user to a generic homepage with no commercial message or quote form.",["Strong journey alignment","Lead leak caused by poor landing page relevance","Ideal association workflow","Completed retention campaign"],1,"The ad intent and landing page do not match. Commercial prospects need a relevant commercial page and clear request path."]]},
{type:"quiz",kicker:"Knowledge check",title:"Check the journey <em>connections</em>",pass:5,questions:[
["What is the best description of the pest control customer journey?",["A customer clicks an ad and marketing is complete","A path from pest concern to search, evaluation, contact, qualification, booking, service, and follow-up","A technician-only process","A list of social media ideas"],1],
["Why does the journey differ between residential, association, and commercial customers?",["They all have identical priorities","Each audience has different triggers, decision-makers, trust factors, and conversion paths","Commercial customers never search online","Residential customers never read reviews"],1],
["Which stage is most closely connected to reviews, service pages, trust signals, and website clarity?",["Evaluation","Technician dispatch only","Payroll","Inventory"],0],
["A property manager searching HOA pest control company most likely needs:",["A homeowner-only mosquito page","Association-focused messaging about reliability, documentation, communication, and recurring support","A generic blog with no contact option","A DIY-only guide"],1],

<script>
(function(){const d=moduleData,viewer=document.getElementById("viewer"),stepper=document.getElementById("stepper"),counter=document.getElementById("counter"),footerTitle=document.getElementById("footerTitle"),progressFill=document.getElementById("progressFill"),progressText=document.getElementById("progressText"),prevBtn=document.getElementById("prevBtn"),nextBtn=document.getElementById("nextBtn"),reset=document.getElementById("resetProgress"),live=document.createElement("div");live.className="sr-only";live.setAttribute("aria-live","polite");document.body.appendChild(live);let current=0,visited=new Set([0]),scenarioIndex={};const esc=s=>String(s).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");function list(x){return Array.isArray(x)?`<ul>${x.map(i=>`<li>${esc(i)}</li>`).join("")}</ul>`:`<p>${esc(x)}</p>`}function slideHead(s){return `<div class="slide-head"><span class="eyebrow">${esc(s.kicker||"Module "+d.module)}</span><h1 class="slide-title">${s.title}</h1></div>`}function cards(cards,cls="grid"){return `<div class="${cls}">${cards.map(c=>`<div class="card"><span class="tag">${esc(c[0])}</span>${list(c[1])}</div>`).join("")}</div>`}function renderSlide(s,i){let body="";if(s.type==="hero")body=`<p class="lede">${esc(s.lede)}</p>${cards(s.cards)}`;if(s.type==="cards")body=`<p class="lede">${esc(s.lede||"")}</p>${cards(s.cards,s.cards.length>2?"grid three":"grid")}`;if(s.type==="accordion")body=`<p class="lede">${esc(s.lede)}</p><div class="accordion">${s.items.map((it,n)=>`<article class="acc-item"><button class="acc-toggle" type="button" aria-expanded="false"><span class="num">${n+1}</span><strong>${esc(it[0])}</strong><span>&gt;</span></button><div class="acc-detail"><p>${esc(it[1])}</p><p>${esc(it[2])}</p></div></article>`).join("")}</div>`;if(s.type==="tabs")body=`<div class="tabs" role="tablist">${s.tabs.map((t,n)=>`<button class="tab-btn ${n?'':'active'}" type="button" role="tab" aria-selected="${n?'false':'true'}" data-tab="${i}-${n}">${esc(t[0])}</button>`).join("")}</div>${s.tabs.map((t,n)=>`<article class="tab-panel ${n?'':'active'}" data-panel="${i}-${n}"><div class="panel"><h3>${esc(t[0])}</h3><p>${esc(t[1])}</p></div></article>`).join("")}`;if(s.type==="compare")body=`<p class="lede">${esc(s.lede||"")}</p><div class="do-dont"><div class="panel do-panel"><h3>${esc(s.leftTitle)}</h3>${list(s.left)}</div><div class="panel dont-panel"><h3>${esc(s.rightTitle)}</h3>${list(s.right)}</div></div>`;if(s.type==="flow")body=`<div class="grid three">${s.steps.map((x,n)=>`<div class="card"><span class="tag">Step ${n+1}</span><p>${esc(x)}</p></div>`).join("")}</div><div class="callout"><h3>Key callout</h3><p>${esc(s.callout)}</p></div>`;if(s.type==="sequence")body=`<p class="lede">${esc(s.instructions)}</p><div class="match-list">${s.items.map(it=>`<div class="match-row"><div class="query">${esc(it[0])}. ${esc(it[1])}</div><select data-answer="${it[2]}"><option value="">Choose order...</option>${s.items.map((_,n)=>`<option value="${n+1}">${n+1}</option>`).join("")}</select></div>`).join("")}</div><button class="button primary" data-check="sequence" type="button">Check Order</button><div class="feedback" aria-live="polite"></div>`;if(s.type==="match")body=`<p class="lede">${esc(s.instructions)}</p><div class="match-list">${s.items.map((it,n)=>`<div class="match-row"><div class="query">${n+1}. ${esc(it[0])}</div><select data-answer="${esc(it[1])}"><option value="">Choose...</option>${s.options.map(o=>`<option value="${esc(o[0])}">${esc(o[0])}. ${esc(o[1])}</option>`).join("")}</select></div>`).join("")}</div><button class="button primary" data-check="match" type="button">Check Matches</button><div class="feedback" aria-live="polite"></div>`;if(s.type==="scenario")body=`<div data-scenario="${i}"></div><div class="feedback" aria-live="polite"></div><button class="button primary" data-next-scenario="${i}" type="button">Next Scenario</button>`;if(s.type==="quiz")body=`${s.questions.map((q,qi)=>`<fieldset class="activity-card" style="margin:${qi?10:0}px 0 0;border:1px solid var(--tan)"><legend class="tag">Question ${qi+1}</legend><h3>${esc(q[0])}</h3><div class="options">${q[1].map((o,oi)=>`<label class="choice"><input type="radio" name="q-${i}-${qi}" data-correct="${oi===q[2]}"> ${String.fromCharCode(65+oi)}. ${esc(o)}</label>`).join("")}</div></fieldset>`).join("")}<button class="button primary" data-quiz="${i}" type="button">Submit Knowledge Check</button><div class="feedback" aria-live="polite"></div>`;if(s.type==="takeaways")body=`${list(s.takeaways)}<div class="grid"><div class="card"><span class="tag">Downloadable resources</span><p>Keep these quick-reference files for planning and review.</p><div>${s.downloads.map(x=>`<button class="button ${x[0]==='journey'?'dark-primary':'secondary'}" data-download="${x[0]}" type="button">${esc(x[1])}</button>`).join(" ")}</div></div><div class="card"><span class="tag">Complete</span><p>${esc(d.next)}</p><button class="button dark-primary" id="completeModule" type="button">Complete Module ${d.module}</button><div class="completion-message" id="completionMessage">Module ${d.module} complete. ${esc(d.next)}</div></div></div>`;return `<section class="slide ${s.dark?'dark':''}" data-title="${esc(s.kicker||s.title.replace(/<[^>]+>/g,''))}">${slideHead(s)}<div class="slide-body">${body}</div></section>`}function renderScenario(i){const s=d.slides[i],el=viewer.querySelector(`[data-scenario="${i}"]`),fb=el.nextElementSibling,n=scenarioIndex[i]||0,sc=s.scenarios[n];el.innerHTML=`<div class="activity-card"><span class="tag">Scenario ${n+1} of ${s.scenarios.length}</span><h3>${esc(sc[0])}</h3><div class="options">${sc[1].map((o,oi)=>`<button class="choice" type="button" data-ok="${oi===sc[2]}">${String.fromCharCode(65+oi)}. ${esc(o)}</button>`).join("")}</div></div>`;fb.className="feedback";el.querySelectorAll(".choice").forEach(b=>b.onclick=()=>{const ok=b.dataset.ok==="true";el.querySelectorAll(".choice").forEach(c=>{c.disabled=true;if(c.dataset.ok==="true")c.classList.add("correct")});if(!ok)b.classList.add("wrong");setFb(fb,ok,(ok?"Correct. ":"Not quite. ")+sc[3])})}function setFb(el,ok,msg){el.className=`feedback show ${ok?'good':'bad'}`;el.textContent=msg;live.textContent=msg}function update(){viewer.querySelectorAll(".slide").forEach((s,i)=>s.classList.toggle("active",i===current));stepper.querySelectorAll(".step-btn").forEach((b,i)=>{b.classList.toggle("active",i===current);b.classList.toggle("done",visited.has(i));b.setAttribute("aria-current",i===current?"step":"false")});counter.textContent=`Slide ${current+1} of ${d.slides.length}`;footerTitle.textContent=d.steps[current]||"Module content";prevBtn.disabled=current===0;nextBtn.textContent=current===d.slides.length-1?"Finish":"Next";const pct=Math.round(visited.size/d.slides.length*100);progressFill.style.width=pct+"%";progressText.textContent=pct+"%";try{localStorage.setItem(d.storage,JSON.stringify({current,visited:Array.from(visited)}))}catch(e){}requestAnimationFrame(()=>viewer.scrollTop=0)}function goTo(i){if(i<0||i>=d.slides.length)return;current=i;visited.add(i);update()}viewer.innerHTML=d.slides.map(renderSlide).join("");stepper.innerHTML=d.steps.map((x,i)=>`<button class="step-btn" data-step="${i}" type="button"><span class="step-num">${i+1}</span><span class="step-label">${esc(x)}</span></button>`).join("");try{const saved=JSON.parse(localStorage.getItem(d.storage));if(saved){current=saved.current||0;visited=new Set(saved.visited||[0]);visited.add(current)}}catch(e){}d.slides.forEach((s,i)=>{if(s.type==="scenario")renderScenario(i)});viewer.querySelectorAll(".acc-toggle").forEach(b=>b.onclick=()=>{const p=b.closest(".acc-item"),open=p.classList.toggle("open");b.setAttribute("aria-expanded",open)});viewer.querySelectorAll(".tab-btn").forEach(b=>b.onclick=()=>{const root=b.closest(".slide");root.querySelectorAll(".tab-btn").forEach(x=>{x.classList.toggle("active",x===b);x.setAttribute("aria-selected",x===b?"true":"false")});root.querySelectorAll(".tab-panel").forEach(p=>p.classList.toggle("active",p.dataset.panel===b.dataset.tab))});viewer.querySelectorAll("[data-check]").forEach(b=>b.onclick=()=>{const root=b.closest(".slide"),sels=[...root.querySelectorAll("select")],answered=sels.every(s=>s.value),correct=sels.filter(s=>s.value===s.dataset.answer).length,fb=root.querySelector(".feedback");if(!answered)return setFb(fb,false,"Complete every selection before checking.");setFb(fb,correct===sels.length,correct===sels.length?(d.slides[current].success||"Correct. Nice work."):`${correct} of ${sels.length} are correct. ${d.slides[current].partial||"Review the prompt and try again."}`)});viewer.querySelectorAll("[data-next-scenario]").forEach(b=>b.onclick=()=>{const i=+b.dataset.nextScenario;scenarioIndex[i]=((scenarioIndex[i]||0)+1)%d.slides[i].scenarios.length;renderScenario(i)});viewer.querySelectorAll("[data-quiz]").forEach(b=>b.onclick=()=>{const root=b.closest(".slide"),s=d.slides[+b.dataset.quiz];let ans=0,ok=0;s.questions.forEach((_,qi)=>{const a=root.querySelector(`input[name="q-${b.dataset.quiz}-${qi}"]:checked`);if(a){ans++;if(a.dataset.correct==="true")ok++}});const fb=root.querySelector(".feedback");if(ans<s.questions.length)return setFb(fb,false,`Answer all ${s.questions.length} questions before submitting.`);setFb(fb,ok>=s.pass,true?`${ok} of ${s.questions.length}. ${ok>=s.pass?s.success:s.remed}`:"")});viewer.querySelectorAll("[data-download]").forEach(b=>b.onclick=()=>{const map={journey:"BuzzKill Customer Journey Map Checklist\n\n1. Identify customer type.\n2. Match the concern to a journey stage.\n3. Confirm the right page, CTA, and handoff.\n4. Track source, lead quality, booked outcome, and follow-up opportunity.\n",channels:"BuzzKill Channel-Stage Guide\n\nGBP and service pages: Search/Evaluation.\nClick-to-call: Contact.\nLead form: Contact/Qualification.\nReview request: Follow-up/Retention.\nSeasonal email: Awareness/Retention.\nCall tracking: Qualification/Measurement.\n"};const blob=new Blob([map[b.dataset.download]],{type:"text/plain"}),url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url;a.download=`buzzkill-module-${d.module}-${b.dataset.download}.txt`;a.click();URL.revokeObjectURL(url)});stepper.querySelectorAll(".step-btn").forEach(b=>b.onclick=()=>goTo(+b.dataset.step));prevBtn.onclick=()=>goTo(current-1);nextBtn.onclick=()=>current===d.slides.length-1?(visited=new Set(d.slides.map((_,i)=>i)),update()):goTo(current+1);reset.onclick=()=>{current=0;visited=new Set([0]);try{localStorage.removeItem(d.storage)}catch(e){}update()};document.addEventListener("keydown",e=>{if(["INPUT","SELECT","TEXTAREA","BUTTON"].includes(e.target.tagName))return;if(e.key==="ArrowLeft")goTo(current-1);if(e.key==="ArrowRight")goTo(current+1)});viewer.addEventListener("click",e=>{if(e.target.id==="completeModule"){visited=new Set(d.slides.map((_,i)=>i));document.getElementById("completionMessage").classList.add("show");update()}});update()})();
