    <text x="1570" y="450" text-anchor="end">1,430.00</text>
    <text x="158" y="491">1015 Funds in Transit</text>
    <text x="1570" y="491" text-anchor="end">200.00</text>
    <text x="158" y="532">TEST BANK ACCOUNT - 0001</text>
    <text x="1570" y="532" text-anchor="end">5,000.00</text>
    <text x="158" y="572" font-weight="800">Total Current Asset</text>
    <text x="1570" y="572" text-anchor="end" font-weight="800">$6,630.00</text>
    <line x1="80" y1="585" x2="1570" y2="585" stroke="#c8c8c8" stroke-width="2"/>
    <text x="118" y="633" font-weight="800">Total Assets</text>
    <text x="1570" y="633" text-anchor="end" font-weight="800">$6,630.00</text>
    <line x1="80" y1="650" x2="1570" y2="650" stroke="#000" stroke-width="2"/>

