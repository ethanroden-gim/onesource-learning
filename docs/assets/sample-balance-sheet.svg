    <text x="158" y="910">2301 Loan Payable</text>
    <text x="1570" y="910" text-anchor="end">10,000.00</text>
    <text x="158" y="951" font-weight="800">Total Long Term Liability</text>
    <text x="1570" y="951" text-anchor="end" font-weight="800">$10,000.00</text>
    <line x1="80" y1="964" x2="1570" y2="964" stroke="#c8c8c8" stroke-width="2"/>
    <text x="118" y="993" font-weight="800">Total Liabilities</text>
    <text x="1570" y="993" text-anchor="end" font-weight="800">$11,000.00</text>
    <line x1="80" y1="1010" x2="1570" y2="1010" stroke="#000" stroke-width="2"/>

    <text x="90" y="1064" font-weight="800">Equity</text>
    <text x="158" y="1105">3001 Opening Balance Equity</text>
    <text x="1570" y="1105" text-anchor="end">(8,300.00)</text>
    <text x="158" y="1146">3201 Retained Earnings</text>
    <text x="1570" y="1146" text-anchor="end">0.00</text>
    <text x="158" y="1187">Net Income</text>
    <text x="1570" y="1187" text-anchor="end">3,930.00</text>
    <text x="118" y="1228" font-weight="800">Total Equity</text>
    <text x="1570" y="1228" text-anchor="end" font-weight="800">($4,370.00)</text>
    <line x1="80" y1="1242" x2="1570" y2="1242" stroke="#000" stroke-width="2"/>
