<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1650 1484" role="img" aria-labelledby="title desc">
  <title id="title">Sample Balance Sheet for Test Association</title>
  <desc id="desc">Balance Sheet as of April 30, 2026, showing assets, liabilities, equity, and total liabilities and equity of 6,630 dollars.</desc>
  <rect width="1650" height="1484" fill="#fff"/>
  <rect x="85" y="65" width="312" height="129" fill="#000"/>
  <text x="118" y="132" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="900" fill="#fff" letter-spacing="8">GIM</text>
  <text x="245" y="128" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900" fill="#82bd58">PROPERTY</text>
  <text x="245" y="151" font-family="Arial, Helvetica, sans-serif" font-size="19" font-weight="900" fill="#82bd58">MANAGEMENT</text>
