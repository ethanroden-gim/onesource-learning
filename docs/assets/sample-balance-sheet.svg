    <text x="158" y="786">2001 Accounts Payable</text>
    <text x="1570" y="786" text-anchor="end">1,000.00</text>
    <text x="158" y="827" font-weight="800">Total Current Liability</text>
    <text x="1570" y="827" text-anchor="end" font-weight="800">$1,000.00</text>
    <line x1="80" y1="840" x2="1570" y2="840" stroke="#c8c8c8" stroke-width="2"/>
