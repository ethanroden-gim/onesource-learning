  <text x="134" y="170" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="700" fill="#000" letter-spacing="5">RENT | MANAGE | MAINTAIN</text>
  <path d="M124 112 L146 82 L179 93 L214 82 L237 116 L221 116 L209 97 L178 107 L148 97 L135 116 Z" fill="#82bd58"/>

  <text x="838" y="106" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="50" fill="#000">Balance Sheet</text>
  <text x="838" y="161" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#000">As of 4/30/2026, Accrual Basis</text>
  <text x="1240" y="88" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#626b73">GIM Property Management, LLC</text>
  <text x="1240" y="118" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#626b73">www.gimpm.com</text>
  <text x="1240" y="148" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#626b73">contact@gimpm.com</text>
  <text x="1240" y="178" font-family="Arial, Helvetica, sans-serif" font-size="25" fill="#626b73">(617) 404-9801</text>

  <rect x="80" y="260" width="1490" height="56" fill="#ccc"/>
  <text x="92" y="296" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="800" fill="#000">TEST ASSOCIATION</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#000">
