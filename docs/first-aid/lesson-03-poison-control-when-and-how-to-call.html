<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BuzzKill First Aid · Lesson 3 · Poison Control: When and How to Call</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    /* BuzzKill brand tokens */
    --bk-black:#0E0E0C;
    --bk-ink:#1B1914;
    --bk-lime:#5FD12F;
    --bk-lime-bright:#74E640;
    --bk-forest:#1F5A14;
    --bk-mint:#D4ECC4;
    --bk-cream:#FBF8F2;
    --bk-sand:#EBE3D0;
    --bk-tan:#D6CDB8;
    --bk-stone:#504B40;
    --bk-warm-gray:#7A7363;
    --bk-white:#FFFFFF;
    --bk-amber:#E8A33D;

    /* Semantic */
    --ink:var(--bk-ink);
    --muted:var(--bk-warm-gray);
    --line:var(--bk-tan);
    --bg:var(--bk-sand);
    --callout-bg:var(--bk-mint);
    --callout-bd:var(--bk-forest);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--ink);
    font-family:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    -webkit-font-smoothing:antialiased}
  .heading{font-family:"Fraunces",Georgia,serif;font-weight:600;letter-spacing:-0.01em}
  .wrap{width:100%;height:100%;display:flex;align-items:center;justify-content:center;padding:12px}
  /* Fixed 16:9 frame, scales to container */
  .frame{
    width:min(100%,1280px);
    aspect-ratio:16/9;
    background:var(--bk-cream);
    border:1px solid var(--bk-tan);
    border-radius:14px;
    box-shadow:0 6px 28px rgba(14,14,12,.12);
    display:grid;
    grid-template-rows:auto auto 1fr auto;
    overflow:hidden;
  }
  /* HEADER — dark tactical band */
  header{
    background:var(--bk-black);color:var(--bk-cream);
    padding:10px 18px;display:flex;align-items:center;gap:14px;
  }
  .badge{
    width:36px;height:36px;border-radius:8px;background:var(--bk-lime);
    display:flex;align-items:center;justify-content:center;
    font-family:"Fraunces",serif;font-weight:700;color:var(--bk-black);font-size:15px;letter-spacing:.5px;
  }
  .titles{display:flex;flex-direction:column;line-height:1.15}
  .titles .t1{font-family:"Fraunces",serif;font-weight:600;font-size:16px;letter-spacing:-0.01em}
  .titles .t1 em{font-style:italic;color:var(--bk-lime);font-weight:600}
  .titles .t2{font-family:"Inter",sans-serif;font-size:10.5px;color:var(--bk-tan);margin-top:2px;letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
  .modwrap{margin-left:auto;display:flex;align-items:center;gap:8px}
  .modwrap label{font-size:10px;color:var(--bk-tan);letter-spacing:1.2px;text-transform:uppercase;font-weight:600}
  select{
    background:#1c1c1a;color:var(--bk-cream);border:1px solid #2c2c28;border-radius:6px;
    padding:6px 10px;font-family:"Inter",sans-serif;font-size:12px;cursor:pointer;
  }
  select:focus{outline:2px solid var(--bk-lime)}

  /* PILLS NAV */
  .pills{
    display:flex;gap:6px;padding:10px 18px;background:var(--bk-cream);border-bottom:1px solid var(--bk-tan);
    overflow-x:auto;scrollbar-width:thin;
  }
  .pill{
    flex:0 0 auto;border:1px solid var(--bk-tan);background:var(--bk-white);
    color:var(--bk-stone);font-family:"Inter",sans-serif;font-weight:500;font-size:11px;letter-spacing:.3px;
    padding:6px 12px;border-radius:999px;cursor:pointer;white-space:nowrap;
    transition:all .15s ease;
  }
  .pill:hover{border-color:var(--bk-forest);color:var(--bk-ink)}
  .pill.active{background:var(--bk-forest);color:var(--bk-cream);border-color:var(--bk-forest);font-weight:700}
  .pill.done{border-color:var(--bk-forest);color:var(--bk-forest)}

  /* SLIDE STAGE */
  .stage{position:relative;overflow:hidden;background:var(--bk-cream)}
  .slide{
    position:absolute;inset:0;padding:28px 38px;
    display:none;flex-direction:column;gap:14px;
    animation:fade .25s ease;
  }
  .slide.active{display:flex}
  @keyframes fade{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
  .eyebrow{
    color:var(--bk-forest);font-family:"Inter",sans-serif;font-size:10.5px;letter-spacing:1.4px;text-transform:uppercase;font-weight:700;
  }
  h1.slide-h{font-family:"Fraunces",serif;font-weight:600;font-size:34px;line-height:1.1;color:var(--bk-black);letter-spacing:-0.015em}
  h1.slide-h em{font-style:italic;color:var(--bk-forest);font-weight:600}
  h2.slide-sub{font-family:"Fraunces",serif;font-weight:600;font-size:20px;color:var(--bk-ink);margin-top:2px}
  p,li{font-family:"Inter",sans-serif;font-size:14px;line-height:1.55;color:var(--bk-ink)}
  em{font-style:italic;color:var(--bk-forest)}
  ul.tight{padding-left:18px}
  ul.tight li{margin:4px 0}
  ul.tight li::marker{color:var(--bk-forest)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
  .card{
    border:1px solid var(--bk-tan);border-radius:10px;padding:14px 16px;background:var(--bk-white);
  }
  .card h3{font-family:"Fraunces",serif;font-weight:600;font-size:14px;color:var(--bk-black);margin-bottom:6px;letter-spacing:-0.005em}
  .card p,.card li{font-size:12.5px;line-height:1.5}
  .callout{
    border-left:4px solid var(--callout-bd);background:var(--callout-bg);
    padding:10px 14px;border-radius:6px;
  }
  .callout strong{color:var(--bk-forest);font-weight:700}
  .num-list{counter-reset:step;display:grid;gap:8px}
  .num-list .step{display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start}
  .num-list .step::before{
    counter-increment:step;content:counter(step);
    width:26px;height:26px;border-radius:50%;background:var(--bk-forest);color:var(--bk-cream);
    display:flex;align-items:center;justify-content:center;
    font-family:"Fraunces",serif;font-weight:700;font-size:13px;
  }
  .kv{display:grid;grid-template-columns:160px 1fr;gap:8px 14px;font-size:13px}
  .kv dt{color:var(--bk-forest);font-weight:700;font-family:"Inter",sans-serif;letter-spacing:.2px}
  .kv dd{color:var(--bk-ink)}
  .tag{display:inline-block;padding:2px 8px;border-radius:999px;background:var(--bk-mint);color:var(--bk-forest);font-size:10px;letter-spacing:.8px;text-transform:uppercase;font-weight:700}

  /* CONTROLS */
  footer{
    background:var(--bk-cream);border-top:1px solid var(--bk-tan);
    padding:10px 18px;display:flex;align-items:center;gap:14px;
  }
  .progress{flex:1;height:8px;background:var(--bk-sand);border-radius:999px;overflow:hidden;border:1px solid var(--bk-tan)}
  .progress > span{display:block;height:100%;background:var(--bk-forest);width:0;transition:width .25s ease}
  .meter{font-family:"Inter",sans-serif;font-size:11px;color:var(--bk-stone);letter-spacing:.5px;min-width:84px;text-align:right;font-weight:500}
  .btn{
    border:1px solid var(--bk-black);background:var(--bk-cream);color:var(--bk-black);
    font-family:"Inter",sans-serif;font-weight:600;font-size:11.5px;letter-spacing:.7px;text-transform:uppercase;
    padding:8px 14px;border-radius:8px;cursor:pointer;transition:all .15s;
  }
  .btn:hover{background:var(--bk-black);color:var(--bk-cream)}
  .btn.primary{background:var(--bk-forest);border-color:var(--bk-forest);color:var(--bk-cream)}
  .btn.primary:hover{background:var(--bk-black);border-color:var(--bk-black);color:var(--bk-lime)}
  .btn.ghost{border-color:var(--bk-tan);color:var(--bk-stone)}
  .btn:disabled{opacity:.35;cursor:not-allowed}
  /* Responsive type for smaller LMS embeds */
  @media (max-width:900px){
    h1.slide-h{font-size:22px}
    h2.slide-sub{font-size:15px}
    p,li{font-size:12.5px}
    .grid2{grid-template-columns:1fr}
    .grid3{grid-template-columns:1fr 1fr}
    .slide{padding:20px 22px;gap:10px}
  }
</style>
</head>
<body>
<div class="wrap">
  <section class="frame" aria-label="IPM Training Module">
    <header>
      <div class="badge">BK</div>
      <div class="titles">
        <span class="t1">BuzzKill <em>First Aid</em> Training</span>
        <span class="t2" id="modLabel">Module 1 · The IPM Framework</span>
      </div>
    </header>

    <nav class="pills" id="pills" aria-label="Slide navigation"></nav>

    <div class="stage" id="stage" aria-live="polite"></div>

    <footer>
      <button class="btn" id="btnReset" title="Reset module">Reset</button>
      <button class="btn" id="btnPrev">‹ Previous</button>
      <div class="progress" aria-label="Module progress"><span id="bar"></span></div>
      <div class="meter" id="meter">0 / 0</div>
      <button class="btn primary" id="btnNext">Next ›</button>
    </footer>
  </section>
</div>

<script>
/* ============================================================
   COURSE DATA — concise, slide-ready instructional content
   ============================================================ */
const COURSE = [
  {
    id: 'l3',
    title: 'Poison Control: When and How to Call',
    slides: [
      {
        eyebrow: 'Lesson 03 · Overview',
        h: '1-800-222-1222',
        body: `<p>Poison Control is staffed by toxicologists 24 hours a day. They will tell you whether a given exposure needs an ER, what to do <em>right now</em>, and whether to expect delayed symptoms. They do not replace 911 — they complement it.</p>`
      },
      {
        eyebrow: 'Triage',
        h: '911 first vs. Poison Control first',
        body: `<div class="grid2">
                <div class="card"><h3>Call 911 first when</h3>
                  <ul class="tight">
                    <li>The person is unresponsive, seizing, or struggling to breathe.</li>
                    <li>There is severe bleeding or trauma in addition to exposure.</li>
                    <li>You are uncertain whether the exposure is life-threatening.</li>
                  </ul></div>
                <div class="card"><h3>Call Poison Control first when</h3>
                  <ul class="tight">
                    <li>The person is alert, breathing normally, and stable.</li>
                    <li>You need guidance on treatment for a non-life-threatening exposure.</li>
                    <li>You are unsure whether the symptoms warrant an ER visit.</li>
                  </ul></div>
              </div>`
      },
      {
        eyebrow: 'Before you dial',
        h: 'Have this ready — 1-800-222-1222',
        body: `<ul class="tight">
                <li>Product name and EPA registration number.</li>
                <li>The SDS (Safety Data Sheet).</li>
                <li>Approximate quantity involved.</li>
                <li>Route of exposure — skin, eyes, inhalation, ingestion.</li>
                <li>Time of exposure.</li>
                <li>Patient age and weight.</li>
                <li>Current symptoms.</li>
                <li>Any first aid already given.</li>
              </ul>`
      },
      {
        eyebrow: 'On the call',
        h: 'Working a Poison Control call',
        body: `<div class="num-list">
                <div class="step"><div><strong>Move to a quiet spot.</strong> Step a few feet away if you can — but stay in line of sight of the patient.</div></div>
                <div class="step"><div><strong>Give them the basics in 30 seconds.</strong> Product, route, time, symptoms, age. Let them ask follow-ups.</div></div>
                <div class="step"><div><strong>Read the SDS aloud if asked.</strong> Section 4 (first-aid measures) and Section 11 (toxicological information) are what they will want.</div></div>
                <div class="step"><div><strong>Write down their case number.</strong> You will need it for the incident report. Confirm spelling of any drug names they recommend.</div></div>
                <div class="step"><div><strong>Follow their instructions exactly.</strong> Do not improvise. If they tell you to monitor and rest, monitor and rest. If they tell you to transport, transport.</div></div>
              </div>`
      }
    ]
  }
];

/* ============================================================
   APP STATE + RENDER
   ============================================================ */
const state = { modIdx:0, slideIdx:0 };

const $modLabel = document.getElementById('modLabel');
const $pills = document.getElementById('pills');
const $stage = document.getElementById('stage');
const $bar = document.getElementById('bar');
const $meter = document.getElementById('meter');
const $btnPrev = document.getElementById('btnPrev');
const $btnNext = document.getElementById('btnNext');
const $btnReset = document.getElementById('btnReset');

function initModuleSelect(){}

function renderPills(){
  const mod = COURSE[state.modIdx];
  $pills.innerHTML = '';
  mod.slides.forEach((s,i)=>{
    const b = document.createElement('button');
    b.className = 'pill' + (i===state.slideIdx?' active':'') + (i<state.slideIdx?' done':'');
    b.textContent = `${String(i+1).padStart(2,'0')} · ${s.h.length>34?s.h.slice(0,32)+'…':s.h}`;
    b.title = s.h;
    b.addEventListener('click', ()=>{ state.slideIdx = i; renderAll(); });
    $pills.appendChild(b);
  });
}

function renderStage(){
  const mod = COURSE[state.modIdx];
  $stage.innerHTML = '';
  mod.slides.forEach((s,i)=>{
    const el = document.createElement('article');
    el.className = 'slide' + (i===state.slideIdx?' active':'');
    el.innerHTML = `
      <div class="eyebrow">${s.eyebrow}</div>
      <h1 class="slide-h heading">${s.h}</h1>
      ${s.body}
    `;
    $stage.appendChild(el);
  });
}

function renderControls(){
  const mod = COURSE[state.modIdx];
  $modLabel.textContent = `Lesson 3 · ${mod.title}`;
  const total = mod.slides.length;
  const pct = ((state.slideIdx+1)/total)*100;
  $bar.style.width = pct + '%';
  $meter.textContent = `${state.slideIdx+1} / ${total}`;
  $btnPrev.disabled = state.slideIdx===0 && state.modIdx===0;
  $btnNext.textContent = (state.slideIdx===total-1 && state.modIdx<COURSE.length-1) ? 'Next module ›' :
                        (state.slideIdx===total-1 && state.modIdx===COURSE.length-1) ? 'Finish' : 'Next ›';
}

function renderAll(){
  renderPills();
  renderStage();
  renderControls();
}

function next(){
  const mod = COURSE[state.modIdx];
  if(state.slideIdx < mod.slides.length-1){
    state.slideIdx++;
  } else if(state.modIdx < COURSE.length-1){
    state.modIdx++; state.slideIdx = 0;
  }
  renderAll();
}
function prev(){
  if(state.slideIdx > 0){ state.slideIdx--; }
  else if(state.modIdx > 0){
    state.modIdx--; state.slideIdx = COURSE[state.modIdx].slides.length-1;
  }
  renderAll();
}
function reset(){ state.slideIdx = 0; renderAll(); }

$btnNext.addEventListener('click', next);
$btnPrev.addEventListener('click', prev);
$btnReset.addEventListener('click', reset);

document.addEventListener('keydown', e=>{
  if(e.target.tagName==='SELECT') return;
  if(e.key==='ArrowRight') next();
  if(e.key==='ArrowLeft') prev();
});

initModuleSelect();
renderAll();
</script>
</body>
</html>
